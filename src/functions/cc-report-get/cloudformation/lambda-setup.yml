AWSTemplateFormatVersion: "2010-09-09"

Parameters:
  ApiGatewayRestApiId:
    Type: String
  ApiGatewayReportResourceId:     # imported from cc-report-generate stack
    Type: String
  StageName:
    Type: String
  Env:
    Type: String
    Default: Development
  BucketName:
    Type: String
  DynamoDBTableSuffix:
    Type: String
    Default: dev

Resources:

  # ── Lambda ───────────────────────────────────────────────────────────────────
  ReportGetLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub cc-report-get-${StageName}
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          STAGE:          !Ref StageName
          REPORTS_TABLE:  !Sub cc-reports-${DynamoDBTableSuffix}
          USERS_TABLE:    !Sub cc-users-${DynamoDBTableSuffix}
      Code:
        S3Bucket: !Ref BucketName
        S3Key: cc-report-get/function.zip
      Role: !GetAtt ReportGetRole.Arn
      TracingConfig:
        Mode: Active

  # ── IAM Role ─────────────────────────────────────────────────────────────────
  ReportGetRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReportGetPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-users-${DynamoDBTableSuffix}
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-reports-${DynamoDBTableSuffix}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-reports-${DynamoDBTableSuffix}/index/userId-index
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: "*"

  # ── Lambda Permission ─────────────────────────────────────────────────────────
  ReportGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReportGetLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApiId}/*

  # ── API Gateway: /report/{userId} ────────────────────────────────────────────
  ReportUserIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApiId
      ParentId:  !Ref ApiGatewayReportResourceId
      PathPart:  "{userId}"

  # ── GET /report/{userId} ─────────────────────────────────────────────────────
  ReportGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId:         !Ref ApiGatewayRestApiId
      ResourceId:        !Ref ReportUserIdResource
      HttpMethod:        GET
      AuthorizationType: NONE
      Integration:
        Type:                  AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - { LambdaArn: !GetAtt ReportGetLambda.Arn }
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"

  # ── OPTIONS /report/{userId} (CORS) ──────────────────────────────────────────
  ReportGetOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId:         !Ref ApiGatewayRestApiId
      ResourceId:        !Ref ReportUserIdResource
      HttpMethod:        OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{ "statusCode": 200 }'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin:  "'*'"
              method.response.header.Access-Control-Allow-Methods: "'GET, OPTIONS'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type, Authorization'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin:  true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Headers: true
