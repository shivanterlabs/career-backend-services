AWSTemplateFormatVersion: "2010-09-09"

Parameters:
  ApiGatewayRestApiId:
    Type: String
  ApiGatewayRootResourceId:
    Type: String
  StageName:
    Type: String
  Env:
    Type: String
    Default: Development
  BucketName:
    Type: String
  DynamoDBTableSuffix:
    Type: String
    Default: dev
  AnthropicApiKey:
    Type: String
    NoEcho: true

Resources:

  # ── Lambda ───────────────────────────────────────────────────────────────────
  AiChatMessageLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub cc-ai-chat-message-${StageName}
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 30          # Haiku is fast but tool-use loop needs headroom
      MemorySize: 256      # career_details.json in memory is ~350KB — 256MB plenty
      Environment:
        Variables:
          STAGE:               !Ref StageName
          USERS_TABLE:         !Sub cc-users-${DynamoDBTableSuffix}
          REPORTS_TABLE:       !Sub cc-reports-${DynamoDBTableSuffix}
          AI_CHATS_TABLE:      !Sub cc-ai-chats-${DynamoDBTableSuffix}
          ANTHROPIC_API_KEY:   !Ref AnthropicApiKey
          AI_CHAT_FREE_LIMIT:  "50"
      Code:
        S3Bucket: !Ref BucketName
        S3Key: cc-ai-chat-message/function.zip
      Role: !GetAtt AiChatMessageRole.Arn
      TracingConfig:
        Mode: Active

  # ── IAM Role ─────────────────────────────────────────────────────────────────
  AiChatMessageRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AiChatMessagePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-users-${DynamoDBTableSuffix}
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-reports-${DynamoDBTableSuffix}
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-ai-chats-${DynamoDBTableSuffix}
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: "*"

  # ── Lambda Permission ─────────────────────────────────────────────────────────
  AiChatMessagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AiChatMessageLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApiId}/*

  # ── API Gateway: /ai (PRIMARY — exports resource ID for cc-ai-chat-summary) ──
  AiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApiId
      ParentId:  !Ref ApiGatewayRootResourceId
      PathPart:  ai

  # ── /ai/chat ─────────────────────────────────────────────────────────────────
  AiChatResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApiId
      ParentId:  !Ref AiResource
      PathPart:  chat

  # ── POST /ai/chat ─────────────────────────────────────────────────────────────
  AiChatPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId:         !Ref ApiGatewayRestApiId
      ResourceId:        !Ref AiChatResource
      HttpMethod:        POST
      AuthorizationType: NONE
      Integration:
        Type:                  AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - { LambdaArn: !GetAtt AiChatMessageLambda.Arn }
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"

  # ── OPTIONS /ai/chat (CORS) ───────────────────────────────────────────────────
  AiChatOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId:         !Ref ApiGatewayRestApiId
      ResourceId:        !Ref AiChatResource
      HttpMethod:        OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{ "statusCode": 200 }'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin:  "'*'"
              method.response.header.Access-Control-Allow-Methods: "'POST, OPTIONS'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type, Authorization'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin:  true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Headers: true

Outputs:
  AiResourceId:
    Description: API Gateway /ai resource ID (used by cc-ai-chat-summary)
    Value: !Ref AiResource
    Export:
      Name: !Sub cc-ai-resource-id-${StageName}

  AiChatResourceId:
    Description: API Gateway /ai/chat resource ID
    Value: !Ref AiChatResource
    Export:
      Name: !Sub cc-ai-chat-resource-id-${StageName}
