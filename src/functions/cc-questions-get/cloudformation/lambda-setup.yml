AWSTemplateFormatVersion: "2010-09-09"

Parameters:
  ApiGatewayRestApiId:
    Type: String
  ApiGatewayRootResourceId:
    Type: String
  StageName:
    Type: String
  Env:
    Type: String
    Default: Development
  BucketName:
    Type: String
  DynamoDBTableSuffix:
    Type: String
    Default: dev

Resources:

  # ── Lambda ───────────────────────────────────────────────────────────────────
  QuestionsGetLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub cc-questions-get-${StageName}
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          STAGE:           !Ref StageName
          QUESTIONS_TABLE: !Sub cc-questions-${DynamoDBTableSuffix}
          TESTS_TABLE:     !Sub cc-tests-${DynamoDBTableSuffix}
      Code:
        S3Bucket: !Ref BucketName
        S3Key: cc-questions-get/function.zip
      Role: !GetAtt QuestionsGetRole.Arn
      TracingConfig:
        Mode: Active

  # ── IAM Role ─────────────────────────────────────────────────────────────────
  QuestionsGetRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: QuestionsGetPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-questions-${DynamoDBTableSuffix}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-questions-${DynamoDBTableSuffix}/index/*
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-tests-${DynamoDBTableSuffix}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-tests-${DynamoDBTableSuffix}/index/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: "*"

  # ── Lambda Permission ─────────────────────────────────────────────────────────
  QuestionsGetPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QuestionsGetLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApiId}/*

  # ── API Gateway: /questions ───────────────────────────────────────────────────
  QuestionsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApiId
      ParentId:  !Ref ApiGatewayRootResourceId
      PathPart:  questions

  # ── GET /questions ────────────────────────────────────────────────────────────
  QuestionsGETMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId:         !Ref ApiGatewayRestApiId
      ResourceId:        !Ref QuestionsResource
      HttpMethod:        GET
      AuthorizationType: NONE
      Integration:
        Type:                  AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - { LambdaArn: !GetAtt QuestionsGetLambda.Arn }
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"

  # ── OPTIONS /questions (CORS) ─────────────────────────────────────────────────
  QuestionsOPTIONSMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId:         !Ref ApiGatewayRestApiId
      ResourceId:        !Ref QuestionsResource
      HttpMethod:        OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{ "statusCode": 200 }'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin:  "'*'"
              method.response.header.Access-Control-Allow-Methods: "'GET, OPTIONS'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type, Authorization'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin:  true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Headers: true

Outputs:
  QuestionsResourceId:
    Description: API Gateway /questions resource ID
    Value: !Ref QuestionsResource
    Export:
      Name: !Sub cc-questions-resource-id-${StageName}
