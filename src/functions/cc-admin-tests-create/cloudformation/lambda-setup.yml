AWSTemplateFormatVersion: "2010-09-09"

Parameters:
  ApiGatewayRestApiId:
    Type: String
  ApiGatewayRootResourceId:
    Type: String
  StageName:
    Type: String
  Env:
    Type: String
    Default: Development
  BucketName:
    Type: String
  DynamoDBTableSuffix:
    Type: String
    Default: dev
  # Resource ID of /admin — exported by cc-admin-auth-login stack
  ApiGatewayAdminResourceId:
    Type: String

Resources:

  # ── Lambda ───────────────────────────────────────────────────────────────────
  AdminTestsCreateLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub cc-admin-tests-create-${StageName}
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          STAGE: !Ref StageName
          TESTS_TABLE: !Sub cc-tests-${DynamoDBTableSuffix}
      Code:
        S3Bucket: !Ref BucketName
        S3Key: cc-admin-tests-create/function.zip
      Role: !GetAtt AdminTestsCreateRole.Arn
      TracingConfig:
        Mode: Active

  # ── IAM Role ─────────────────────────────────────────────────────────────────
  AdminTestsCreateRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AdminTestsCreatePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:PutItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-tests-${DynamoDBTableSuffix}
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: "*"

  # ── Lambda Permission ─────────────────────────────────────────────────────────
  AdminTestsCreatePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AdminTestsCreateLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApiId}/*

  # ── API Gateway: /admin/tests ─────────────────────────────────────────────────
  # /admin resource already exists (created by cc-admin-auth-login stack)
  AdminTestsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApiId
      ParentId: !Ref ApiGatewayAdminResourceId
      PathPart: tests

  # ── GET /admin/tests ──────────────────────────────────────────────────────────
  AdminTestsGETMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApiId
      ResourceId: !Ref AdminTestsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - { LambdaArn: !GetAtt AdminTestsCreateLambda.Arn }
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"

  # ── POST /admin/tests ─────────────────────────────────────────────────────────
  AdminTestsPOSTMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApiId
      ResourceId: !Ref AdminTestsResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - { LambdaArn: !GetAtt AdminTestsCreateLambda.Arn }
      MethodResponses:
        - StatusCode: 201
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"

  # ── OPTIONS /admin/tests (CORS) ───────────────────────────────────────────────
  AdminTestsOPTIONSMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGatewayRestApiId
      ResourceId: !Ref AdminTestsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{ "statusCode": 200 }'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Methods: "'GET, POST, OPTIONS'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type, Authorization'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Headers: true

Outputs:
  AdminTestsResourceId:
    Description: API Gateway /admin/tests resource ID (used by cc-admin-tests-update)
    Value: !Ref AdminTestsResource
    Export:
      Name: !Sub cc-admin-tests-resource-id-${StageName}
