AWSTemplateFormatVersion: "2010-09-09"

Parameters:
  ApiGatewayRestApiId:
    Type: String
  ApiGatewayReportResourceId:     # imported from cc-report-generate stack
    Type: String
  StageName:
    Type: String
  Env:
    Type: String
    Default: Development
  BucketName:
    Type: String
  DynamoDBTableSuffix:
    Type: String
    Default: dev
  ReportsBucketName:
    Type: String

Resources:

  # ── Lambda ───────────────────────────────────────────────────────────────────
  ReportPdfLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub cc-report-pdf-${StageName}
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          STAGE:              !Ref StageName
          REPORTS_TABLE:      !Sub cc-reports-${DynamoDBTableSuffix}
          S3_BUCKET_REPORTS:  !Ref ReportsBucketName
      Code:
        S3Bucket: !Ref BucketName
        S3Key: cc-report-pdf/function.zip
      Role: !GetAtt ReportPdfRole.Arn
      TracingConfig:
        Mode: Active

  # ── IAM Role ─────────────────────────────────────────────────────────────────
  ReportPdfRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReportPdfPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cc-reports-${DynamoDBTableSuffix}
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub arn:aws:s3:::${ReportsBucketName}/pdfs/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: "*"

  # ── Lambda Permission ─────────────────────────────────────────────────────────
  ReportPdfPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReportPdfLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGatewayRestApiId}/*

  # ── API Gateway: /report/pdf ──────────────────────────────────────────────────
  ReportPdfResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayRestApiId
      ParentId:  !Ref ApiGatewayReportResourceId
      PathPart:  pdf

  # ── POST /report/pdf ──────────────────────────────────────────────────────────
  ReportPdfPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId:         !Ref ApiGatewayRestApiId
      ResourceId:        !Ref ReportPdfResource
      HttpMethod:        POST
      AuthorizationType: NONE
      Integration:
        Type:                  AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - { LambdaArn: !GetAtt ReportPdfLambda.Arn }
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: "'*'"

  # ── OPTIONS /report/pdf (CORS) ────────────────────────────────────────────────
  ReportPdfOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId:         !Ref ApiGatewayRestApiId
      ResourceId:        !Ref ReportPdfResource
      HttpMethod:        OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{ "statusCode": 200 }'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin:  "'*'"
              method.response.header.Access-Control-Allow-Methods: "'POST, OPTIONS'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type, Authorization'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin:  true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Headers: true
